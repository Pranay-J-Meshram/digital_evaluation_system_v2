{% extends "base.html" %}

{% block content %}
<h2>Upload Student Answer</h2>

<form method="POST" enctype="multipart/form-data">

    Student<br>

    <select name="student_id">

        {% for s in students %}

        <option value="{{s['id']}}">
            {{s['roll_no']}} - {{s['student_name']}}
        </option>

        {% endfor %}

    </select>

    <br><br>

    Course

    <select name="course_id">
        {% for c in courses %}
        <option value="{{c['id']}}">
            {{c['course_code']}}
        </option>
        {% endfor %}
    </select>

    <br><br>

    Exam

    <select name="exam_id">
        {% for e in exams %}
        <option value="{{e['id']}}">
            {{e['exam_name']}}
        </option>
        {% endfor %}
    </select>

    <br><br>

    Upload Answer Sheet

    <input type="file" name="file">

    <br><br>

    <button type="submit">Upload</button>

</form>
<a href="/invigilator_dashboard">Back</a>
{% endblock %}
