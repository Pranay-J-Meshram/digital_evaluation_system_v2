{% extends "base.html" %}

{% block content %}

<h2>Pending User Approvals</h2>

<table class="table">

    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Action</th>
    </tr>

    {% for u in users %}

    <tr>
        <td>{{ u.name }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.role }}</td>

        <td>
            <a href="/approve_user/{{ u.id }}" class="btn btn-success">Approve</a>
            <a href="/reject_user/{{ u.id }}" class="btn btn-danger">Reject</a>
        </td>
    </tr>

    {% endfor %}

</table>

{% endblock %}
