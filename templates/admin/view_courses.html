{% extends "base.html" %}

{% block content %}

<h2>Courses</h2>

<table border="1">

    <tr>
        <th>Course Code</th>
        <th>Course Name</th>
    </tr>

    {% for c in courses %}

    <tr>
        <td>{{c['course_code']}}</td>
        <td>{{c['course_name']}}</td>
    </tr>

    {% endfor %}

</table>

{% endblock %}
