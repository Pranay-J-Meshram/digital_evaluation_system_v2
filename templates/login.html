<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Digital Evaluation System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: "Segoe UI", sans-serif;
        }

        .main-card {
            max-width: 900px;
            margin: 50px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .2);
            background: #fff;
            display: flex;
        }

        .left-panel {
            background: #1e88e5;
            color: #fff;
            padding: 30px;
            width: 40%;
        }

        .right-panel {
            padding: 40px;
            width: 60%;
        }

        .btn-login {
            background: #1e88e5;
            color: #fff;
        }

        .btn-signup {
            background: #43a047;
            color: #fff;
        }

        #signupForm {
            display: none;
        }
    </style>
</head>

<body>

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="container mt-3">
        <div class="alert alert-warning">
            {% for msg in messages %}
            <p class="mb-0">{{ msg }}</p>
            {% endfor %}
        </div>
    </div>
    {% endif %}
    {% endwith %}

    <div class="main-card">

        <!-- LEFT -->
        <div class="left-panel">
            <h3>Digital Evaluation System</h3>
            <p>Manage Exams, Evaluation & Results Easily</p>
        </div>

        <!-- RIGHT -->
        <div class="right-panel">

            <!-- LOGIN -->
            <div id="loginForm">
                <form method="POST" action="{{ url_for('login') }}">

                    <h4>Login</h4>

                    <input name="username" class="form-control mb-3" placeholder="Username or Email" required>

                    <input name="password" type="password" class="form-control mb-3" placeholder="Password" required>

                    <button class="btn btn-login w-100">Login</button>

                    <p class="mt-3">
                        <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
                    </p>

                    <button type="button" class="btn btn-signup w-100 mt-2" onclick="showSignup()">Create
                        Account</button>

                </form>
            </div>

            <!-- SIGNUP -->
            <div id="signupForm">
                <form method="POST" action="{{ url_for('register') }}">

                    <h4>Register</h4>

                    <!-- ROLE -->
                    <select name="role" id="roleSelect" class="form-control mb-3" required>
                        <option disabled selected>Select Role</option>
                        <option value="faculty">Faculty</option>
                        <option value="invigilator">Invigilator</option>
                    </select>

                    <input name="name" class="form-control mb-3" placeholder="Full Name" required>

                    <!-- EMAIL -->
                    <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

                    <!-- MOBILE -->
                    <input type="text" name="mobile" maxlength="10" pattern="[0-9]{10}" class="form-control mb-3"
                        placeholder="10-digit Mobile" required>

                    <!-- DEPARTMENT -->
                    <select name="department" id="departmentSelect" class="form-control mb-3" required>
                        <option disabled selected>Select Department</option>
                        {% for d in departments %}
                        <option value="{{ d.department }}">{{ d.department }}</option>
                        {% endfor %}
                    </select>

                    <!-- SUBJECTS (ONLY FOR FACULTY) -->
                    <div id="subjectSection" style="display:none;">
                        <label>Select Subjects</label>
                        <div id="subjectsBox" class="mb-2"></div>
                    </div>

                    <!-- HIDDEN FIELDS -->
                    <input type="hidden" name="subjects" id="subjectsField">
                    <input type="hidden" name="course_codes" id="courseCodes">

                    <!-- ADDRESS -->
                    <textarea name="address" class="form-control mb-3" placeholder="Address"></textarea>

                    <button class="btn btn-signup w-100">Register</button>

                    <button type="button" class="btn btn-login w-100 mt-2" onclick="showLogin()">Back to Login</button>

                </form>
            </div>

        </div>
    </div>

    <script>
        function showSignup() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
        }

        function showLogin() {
            document.getElementById("signupForm").style.display = "none";
            document.getElementById("loginForm").style.display = "block";
        }

        const subjectsByDept = {{ subjects_by_dept | tojson | safe }};
        const deptSelect = document.getElementById("departmentSelect");
        const subjectsBox = document.getElementById("subjectsBox");
        const courseCodesInput = document.getElementById("courseCodes");
        const subjectsField = document.getElementById("subjectsField");

        const roleSelect = document.getElementById("roleSelect");
        const subjectSection = document.getElementById("subjectSection");

        let selectedCodes = [];
        let selectedNames = [];

        // ROLE CHANGE → SHOW/HIDE SUBJECTS
        roleSelect.addEventListener("change", () => {
            if (roleSelect.value === "faculty") {
                subjectSection.style.display = "block";
            } else {
                subjectSection.style.display = "none";
                selectedCodes = [];
                selectedNames = [];
                courseCodesInput.value = "";
                subjectsField.value = "";
            }
        });

        // LOAD SUBJECTS
        deptSelect.addEventListener("change", () => {
            const dept = deptSelect.value;
            subjectsBox.innerHTML = "";
            selectedCodes = [];
            selectedNames = [];

            if (subjectsByDept[dept]) {
                subjectsByDept[dept].forEach(sub => {

                    let div = document.createElement("div");

                    div.innerHTML = `
                    <input type="checkbox" value="${sub.code}" 
                           data-name="${sub.name}"
                           onchange="updateCourses(this)">
                    ${sub.name}
                `;

                    subjectsBox.appendChild(div);
                });
            }
        });

        // UPDATE SUBJECTS
        function updateCourses(cb) {
            const name = cb.dataset.name;

            if (cb.checked) {
                selectedCodes.push(cb.value);
                selectedNames.push(name);
            } else {
                selectedCodes = selectedCodes.filter(c => c !== cb.value);
                selectedNames = selectedNames.filter(n => n !== name);
            }

            courseCodesInput.value = selectedCodes.join(",");
            subjectsField.value = selectedNames.join(",");
        }
    </script>

</body>

</html>
