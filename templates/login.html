<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Digital Evaluation System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: "Segoe UI", sans-serif;
        }

        .main-card {
            max-width: 900px;
            margin: 50px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .2);
            background: #fff;
            display: flex;
        }

        .left-panel {
            background: #1e88e5;
            color: #fff;
            padding: 30px;
            width: 40%;
        }

        .right-panel {
            padding: 40px;
            width: 60%;
        }

        .btn-login {
            background: #1e88e5;
            color: #fff;
        }

        .btn-signup {
            background: #43a047;
            color: #fff;
        }

        /* Buttons */
        .btn-approve {
            background: #28a745;
            border: none;
        }

        .btn-reject {
            background: #dc3545;
            border: none;
        }

        .action-buttons a {
            margin-bottom: 5px;
            display: block;
        }

        #signupForm {
            display: none;
        }
    </style>
</head>

<body>

    <div class="main-card">

        <!-- LEFT -->
        <div class="left-panel">
            <h3>Digital Evaluation System</h3>
            <p>Manage Exams, Evaluation & Results Easily</p>
        </div>

        <!-- RIGHT -->
        <div class="right-panel">

            <!-- LOGIN -->
            <div id="loginForm">
                <form method="POST" action="{{ url_for('login') }}">

                    <h4>Login</h4>

                    <select name="role" class="form-control mb-3" required>
                        <option disabled selected>Select Role</option>
                        <option value="admin">Admin</option>
                        <option value="faculty">Faculty</option>
                        <option value="invigilator">Invigilator</option>
                    </select>

                    <input name="username" class="form-control mb-3" placeholder="Username" required>

                    <input name="password" type="password" class="form-control mb-3" placeholder="Password" required>

                    <button class="btn btn-login w-100">Login</button>

                    <p class="mt-3">
                        <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
                    </p>

                    <button type="button" class="btn btn-signup w-100 mt-2" onclick="showSignup()">Create
                        Account</button>

                </form>
            </div>

            <!-- SIGNUP -->
            <div id="signupForm">
                <form method="POST" action="{{ url_for('register') }}">

                    <h4>Register</h4>

                    <select name="role" class="form-control mb-3" required>
                        <option disabled selected>Select Role</option>
                        <option value="faculty">Faculty</option>
                        <option value="invigilator">Invigilator</option>
                    </select>

                    <input name="name" class="form-control mb-3" placeholder="Full Name" required>

                    <input name="email" class="form-control mb-3" placeholder="Email" required>

                    <input name="mobile" class="form-control mb-3" placeholder="Mobile" required>

                    <input name="department" class="form-control mb-3" placeholder="Department" required>

                    <textarea name="address" class="form-control mb-3" placeholder="Address"></textarea>

                    <button class="btn btn-signup w-100">Register</button>

                    <button type="button" class="btn btn-login w-100 mt-2" onclick="showLogin()">Back to
                        Login</button>

                </form>
            </div>

        </div>
    </div>

    <script>
        function showSignup() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
        }
        function showLogin() {
            document.getElementById("signupForm").style.display = "none";
            document.getElementById("loginForm").style.display = "block";
        }
    </script>

</body>

</html>
