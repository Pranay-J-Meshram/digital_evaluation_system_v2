{% extends "base.html" %}

{% block content %}

<h2>Evaluate Answer</h2>

<div class="evaluation-container" style="display:flex; gap:20px;">

    <!-- LEFT SIDE -->
    <div class="answer-view" style="flex:2;">
        <iframe src="/{{ data.file_path }}" width="100%" height="500px"></iframe>
    </div>

    <!-- RIGHT SIDE -->
    <div class="evaluation-form" style="flex:1;">

        <form method="POST">

            <label>Marks</label><br>
            <input type="number" name="marks" required style="width:100%">

            <br><br>

            <label>Comments</label><br>
            <textarea name="comments" style="width:100%"></textarea>

            <br><br>

            <button type="submit" class="btn">Submit</button>

        </form>

    </div>

</div>

{% endblock %}
